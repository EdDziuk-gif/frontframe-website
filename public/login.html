<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FrontFrame — Preview Access</title>
  <link rel="icon" type="image/png" href="images/Logo_FF.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #1E2D40;
      --amber:   #F5A623;
      --offwhite:#F8F6F1;
      --gray:    #8A9BAE;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .lockup {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      width: 100%;
      max-width: 400px;
    }

    .logo img {
      height: 32px;
      display: block;
    }

    .card {
      background: var(--offwhite);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
    }

    .card h1 {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 8px;
    }

    .card p {
      font-size: 0.875rem;
      color: var(--gray);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--navy);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .pw-wrap { position: relative; margin-bottom: 24px; }
    .pw-wrap input[type="password"],
    .pw-wrap input[type="text"] {
      width: 100%;
      padding: 12px 44px 12px 16px;
      border: 1.5px solid #D0D7DF;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      color: var(--navy);
      background: white;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 0;
    }
    .pw-wrap input:focus { border-color: var(--navy); }
    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 0;
      color: var(--gray); display: flex; align-items: center; width: auto;
    }
    .pw-toggle:hover { color: var(--navy); opacity: 1; }

    button {
      width: 100%;
      padding: 14px;
      background: var(--amber);
      color: var(--navy);
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.99); }

    .error {
      margin-top: 16px;
      font-size: 0.875rem;
      color: #C0392B;
      text-align: center;
      display: none;
    }

    .footer-note {
      font-size: 0.75rem;
      color: var(--gray);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="lockup">
    <div class="logo">
      <span class="brand" style="font-size:1.4rem;color:var(--offwhite)">FrontFrame</span>
    </div>

    <div class="card">
      <h1>Preview Access</h1>
      <p>This site is in private preview. Enter your access password to continue.</p>

      <label for="password">Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
        <button type="button" class="pw-toggle" onclick="togglePw('password',this)" tabindex="-1" aria-label="Show password">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <button id="submitBtn">Continue</button>
      <div class="error" id="errorMsg">Incorrect password. Please try again.</div>
    </div>

    <p class="footer-note">frontframe.co &nbsp;·&nbsp; Private Preview</p>
  </div>

  <script>
    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.innerHTML = show
        ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
        : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    }

    const params = new URLSearchParams(window.location.search);
    const next = params.get('next') || '/';

    const input = document.getElementById('password');
    const btn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');

    async function attemptLogin() {
      const password = input.value.trim();
      if (!password) return;

      btn.textContent = 'Checking…';
      btn.disabled = true;
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password, next }),
        });

        if (res.ok) {
          const data = await res.json();
          window.location.href = data.next || '/';
        } else {
          errorMsg.style.display = 'block';
          btn.textContent = 'Continue';
          btn.disabled = false;
          input.focus();
        }
      } catch {
        errorMsg.textContent = 'Something went wrong. Please try again.';
        errorMsg.style.display = 'block';
        btn.textContent = 'Continue';
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', attemptLogin);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') attemptLogin(); });
    input.focus();
  </script>
</body>
</html>
